  <!-- last comment (cut off) -->
  <text x="188" y="80" font-size="12" text-anchor="middle" stroke="none" fill="#666">⌃  earlier comments</text>
  <g transform="translate(16,96)">
    <rect width="344" height="176" rx="8" />
